<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Chess Board</title>
</head>
<body>
    
    <div class="chess-board">
        <div class="row-1">
            <div class="white"><i class="fa-solid fa-chess-rook fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-solid fa-chess-knight fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-solid fa-chess-bishop fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-solid fa-chess-king fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-solid fa-chess-queen fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-solid fa-chess-bishop fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-solid fa-chess-knight fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-solid fa-chess-rook fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
        </div>
        <div class="row-2">
            <div class="black"><i class="fa-solid fa-chess-pawn fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-solid fa-chess-pawn fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-solid fa-chess-pawn fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-solid fa-chess-pawn fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-solid fa-chess-pawn fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-solid fa-chess-pawn fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-solid fa-chess-pawn fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-solid fa-chess-pawn fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
        </div>
        <div class="row-3">
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
        </div>
        <div class="row-4">
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
        </div>
        <div class="row-5">
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
        </div>
        <div class="row-6">
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
            <div class="black"></div>
            <div class="white"></div>
        </div>
        <div class="row-7">
            <div class="white"><i class="fa-regular fa-chess-pawn fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-regular fa-chess-pawn fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-regular fa-chess-pawn fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-regular fa-chess-pawn fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-regular fa-chess-pawn fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-regular fa-chess-pawn fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-regular fa-chess-pawn fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-regular fa-chess-pawn fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
        </div>
        <div class="row-8">
            <div class="black"><i class="fa-regular fa-chess-rook fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-regular fa-chess-knight fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-regular fa-chess-bishop fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-regular fa-chess-king fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-regular fa-chess-queen fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-regular fa-chess-bishop fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
            <div class="black"><i class="fa-regular fa-chess-knight fa-2xl" style="color: rgb(255, 255, 255);"></i></div>
            <div class="white"><i class="fa-regular fa-chess-rook fa-2xl" style="color: rgb(0, 0, 0);"></i></div>
        </div>
    </div>



    <!-- font awesome link -->
    <script src="https://kit.fontawesome.com/0628d3d873.js" crossorigin="anonymous"></script>

</body>
</html>
